<div class="flex flex-col h-full bg-gray-900 rounded-xl overflow-hidden">
  <div class="px-4 py-2 bg-gray-800 text-white text-sm font-semibold">💬 Chat de l'exercice</div>

  <div class="flex-1 overflow-y-auto p-3 space-y-2">
    @for (msg of messages; track msg.id) {
      <div class="flex flex-col max-w-[85%]"
           [class.items-end]="msg.user_id === userId"
           [class.self-end]="msg.user_id === userId">
        <span class="text-xs text-gray-400 mb-1">{{ msg.username }} · {{ msg.created_at | date:'HH:mm' }}</span>
        <div class="px-3 py-2 rounded-xl text-sm text-white"
             [class.bg-blue-600]="msg.user_id === userId"
             [class.bg-gray-700]="msg.user_id !== userId">
          {{ msg.content }}
        </div>
      </div>
    }
    <div #messagesEnd></div>
  </div>

  <div class="flex gap-2 p-3 border-t border-gray-700">
    <input [(ngModel)]="newMessage"
           (keyup.enter)="sendMessage()"
           placeholder="Votre message..."
           class="flex-1 bg-gray-800 text-white text-sm rounded-lg px-3 py-2 outline-none focus:ring-1 focus:ring-blue-500" />
    <button (click)="sendMessage()"
            class="bg-blue-600 hover:bg-blue-500 text-white text-sm px-4 py-2 rounded-lg">
      Envoyer
    </button>
  </div>
</div>
